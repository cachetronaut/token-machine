<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" type="image/svg+xml" href="{{ dashboard.logo_path }}" />
        <title>{{ dashboard.title }}</title>
        {% for href in dashboard.css_assets %}
        <link rel="stylesheet" href="{{ href }}" />
        {% endfor %}
        <script>
            (function () {
                try {
                    var played = sessionStorage.getItem("tm-intro-played") === "1";
                    var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
                    if (!played && !reduced) {
                        document.documentElement.classList.add("intro-pending");
                    }
                } catch (e) {}
            })();
        </script>
    </head>
    <body class="is-loading">
        <main>
            {% include "partials/header.html" %} {% include "partials/metrics.html"
            %} {% include "partials/live.html" %} {% include
            "partials/charts.html" %} {% include "partials/model_cards.html" %} {% include
            "partials/sessions.html" %}
        </main>
        <div class="tooltip" id="tooltip"></div>
        <script type="module" src="{{ dashboard.js_entrypoint }}"></script>
    </body>
</html>
