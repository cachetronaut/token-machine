<section class="live-console live-collapsed" aria-labelledby="live-title" id="live-console">
    <div class="live-strip">
        <button
            class="live-strip-left"
            type="button"
            id="live-toggle"
            aria-expanded="false"
            aria-controls="live-lanes"
        >
            <span class="live-toggle-icon" aria-hidden="true"></span>
            <span class="live-led" id="live-led"></span>
            <div>
                <h2 id="live-title">Live Context</h2>
                <div class="live-subline" id="live-subline">Awaiting sessions</div>
            </div>
        </button>
        <div class="live-strip-stats" aria-label="Live usage summary">
            <div class="live-stat">
                <span>active</span><strong id="live-active">0</strong>
            </div>
            <div class="live-stat">
                <span>prompts</span><strong id="live-queries">0</strong>
            </div>
            <div class="live-stat">
                <span>tools</span><strong id="live-tools">0</strong>
            </div>
            <div class="live-stat">
                <span>agents</span><strong id="live-agents">0</strong>
            </div>
            <div class="live-stat">
                <span>tokens</span><strong id="live-tokens">0</strong>
            </div>
        </div>
    </div>
    <div class="live-lanes" id="live-lanes">
        <div class="live-empty">No live sessions detected</div>
    </div>
</section>
