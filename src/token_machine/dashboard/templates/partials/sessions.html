<section class="dashboard-section section-collapsed" id="recent-sessions-section">
  <button
    class="section-strip"
    type="button"
    data-section-toggle="recent-sessions-section"
    aria-expanded="false"
    aria-controls="recent-sessions"
  >
    <span class="live-toggle-icon" aria-hidden="true"></span>
    <span class="section-led" aria-hidden="true"></span>
    <span class="section-copy">
      <span class="section-title">Recent sessions</span>
      <span class="section-subline"><span id="session-count">0 shown</span></span>
    </span>
    <span class="app-legend section-legend" id="app-legend"></span>
  </button>
  <div class="timeline session-feed section-body" id="recent-sessions"></div>
</section>
