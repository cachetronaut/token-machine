<section class="dashboard-section section-collapsed" id="model-cards-section">
  <button
    class="section-strip"
    type="button"
    data-section-toggle="model-cards-section"
    aria-expanded="false"
    aria-controls="model-profiles-wrap"
  >
    <span class="live-toggle-icon" aria-hidden="true"></span>
    <span class="section-led" aria-hidden="true"></span>
    <span class="section-copy">
      <span class="section-title">Models</span>
      <span class="section-subline">Distribution and model-level behavior</span>
    </span>
  </button>
  <div class="models-body section-body" id="model-profiles-wrap">
    <div class="model-overview">
      <div class="card ops-card dist-card">
        <div class="chart-head">
          <div><h2>Model distribution</h2><span class="eyebrow">Call distribution</span></div>
        </div>
        <div class="model-dist">
          <div class="donut" id="models-donut"><div class="ghost-donut" aria-hidden="true"></div></div>
          <div class="dist-legend" id="models"><div class="ghost-bars" aria-hidden="true"><div class="ghost-bar"><div class="ghost-line tight"></div></div><div class="ghost-bar"><div class="ghost-line tight"></div></div><div class="ghost-bar"><div class="ghost-line tight"></div></div></div></div>
        </div>
      </div>
    </div>
    <div class="card ops-card model-cards-panel">
      <div class="subsection-head">
        <span class="subsection-kicker">Model cards</span>
        <span>Aggregated usage by model</span>
      </div>
      <div class="badge-legend" aria-label="Model-card badge legend">
        <div class="badge-legend-group">
          <span class="badge-legend-title">badges</span>
          <span class="badge-legend-track">
            <span class="badge-legend-item"><span class="rank-medallion category-tools tier-3"><span>TL</span></span><span class="badge-legend-copy">tool usage</span></span>
            <span class="badge-legend-item"><span class="rank-medallion category-commands tier-3"><span>CM</span></span><span class="badge-legend-copy">commands</span></span>
            <span class="badge-legend-item"><span class="rank-medallion category-skills tier-3"><span>SK</span></span><span class="badge-legend-copy">skills</span></span>
            <span class="badge-legend-item"><span class="rank-medallion category-context tier-3"><span>CX</span></span><span class="badge-legend-copy">context</span></span>
            <span class="badge-legend-item"><span class="rank-medallion category-model tier-3"><span>AI</span></span><span class="badge-legend-copy">model class</span></span>
          </span>
        </div>
        <div class="badge-legend-group">
          <span class="badge-legend-title">tiers</span>
          <span class="badge-legend-track">
            <span class="badge-legend-tier-set">
              <span class="rank-medallion tier-1"><span>1</span></span>
              <span class="rank-medallion tier-2"><span>2</span></span>
              <span class="rank-medallion tier-3"><span>3</span></span>
              <span class="rank-medallion tier-4"><span>4</span></span>
              <span class="rank-medallion tier-5"><span>5</span></span>
            </span>
            <span class="badge-legend-copy">adept to elite</span>
          </span>
        </div>
      </div>
      <div class="model-grid" id="model-profiles"><div class="ghost-cards" aria-hidden="true" style="grid-column: 1/-1"><div class="ghost-card"><div class="ghost-line"></div><div class="ghost-block"></div><div class="ghost-line"></div></div><div class="ghost-card"><div class="ghost-line"></div><div class="ghost-block"></div><div class="ghost-line"></div></div><div class="ghost-card"><div class="ghost-line"></div><div class="ghost-block"></div><div class="ghost-line"></div></div><div class="ghost-card"><div class="ghost-line"></div><div class="ghost-block"></div><div class="ghost-line"></div></div></div></div>
    </div>
  </div>
</section>
