<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Token Machine — Intro Mock</title>
<link rel="stylesheet" href="src/token_machine/dashboard/assets/css/base.css" />
<style>
  /* Local font overrides so fonts load when opening this file via file:// */
  @font-face {
    font-family: "Orbitron";
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url("src/token_machine/dashboard/assets/fonts/orbitron-700.ttf") format("truetype");
  }
  @font-face {
    font-family: "Orbitron";
    font-style: normal;
    font-weight: 900;
    font-display: swap;
    src: url("src/token_machine/dashboard/assets/fonts/orbitron-900.ttf") format("truetype");
  }
  @font-face {
    font-family: "Share Tech Mono";
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("src/token_machine/dashboard/assets/fonts/share-tech-mono-400.ttf") format("truetype");
  }
</style>
<style>
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .replay {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 10;
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #181c24;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .replay:hover { border-color: var(--teal); color: var(--teal); }

  .stage {
    width: min(720px, 92vw);
    aspect-ratio: 16 / 9;
    position: relative;
    border: 1px solid var(--line);
    border-radius: 10px;
    background:
      radial-gradient(circle at 50% 50%, rgba(67, 199, 183, .06), transparent 60%),
      linear-gradient(180deg, #0d1014, #08090c);
    overflow: hidden;
  }

  /* HUD grid */
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(67, 199, 183, .035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(67, 199, 183, .035) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: radial-gradient(circle at 50% 50%, #000 0%, transparent 78%);
    opacity: 0;
    animation: hud-grid-in .6s ease-out .1s forwards;
  }

  /* Scan line */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg,
      transparent 42%,
      color-mix(in srgb, var(--teal), transparent 78%) 50%,
      transparent 58%);
    mix-blend-mode: screen;
    pointer-events: none;
    opacity: 0;
    animation: scan-sweep 1.4s cubic-bezier(.6, .05, .3, 1) .35s forwards;
  }

  .intro {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
  }

  /* Interstellar warp streaks — continuous flow, not a burst */
  .warp {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
    perspective: 600px;
  }
  .warp i {
    --angle: 0deg;
    --start: 30px;
    --end: 720px;
    --dur: 1s;
    --delay: 0s;
    --thick: 1.4px;
    --tint: var(--teal);
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: var(--thick);
    border-radius: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      color-mix(in srgb, var(--tint), transparent 60%) 35%,
      color-mix(in srgb, var(--tint), white 30%) 80%,
      #ffffff 100%);
    transform: rotate(var(--angle)) translateX(var(--start));
    transform-origin: 0 50%;
    opacity: 0;
    filter: drop-shadow(0 0 3px color-mix(in srgb, var(--tint), transparent 55%));
    animation: warp-streak var(--dur) cubic-bezier(.15, .55, .25, 1) var(--delay) forwards;
  }

  /* Corner brackets */
  .brackets {
    position: absolute;
    inset: 14%;
    pointer-events: none;
  }
  .brackets span {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--teal);
    opacity: 0;
    filter: drop-shadow(0 0 6px color-mix(in srgb, var(--teal), transparent 50%));
  }
  .brackets span:nth-child(1) { top: 0; left: 0; border-right: 0; border-bottom: 0; animation: bracket-in .5s ease-out .25s forwards; }
  .brackets span:nth-child(2) { top: 0; right: 0; border-left: 0; border-bottom: 0; animation: bracket-in .5s ease-out .32s forwards; }
  .brackets span:nth-child(3) { bottom: 0; left: 0; border-right: 0; border-top: 0; animation: bracket-in .5s ease-out .39s forwards; }
  .brackets span:nth-child(4) { bottom: 0; right: 0; border-left: 0; border-top: 0; animation: bracket-in .5s ease-out .46s forwards; }

  /* Wordmark */
  .wordmark {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
    z-index: 2;
  }

  .wordmark svg {
    width: clamp(280px, 56vw, 480px);
    height: auto;
    overflow: visible;
  }

  .wordmark svg text {
    font-family: var(--font-brand);
    font-weight: 900;
    font-size: 56px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .stroke {
    fill: transparent;
    stroke: var(--teal);
    stroke-width: 1.2;
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    filter: drop-shadow(0 0 8px color-mix(in srgb, var(--teal), transparent 55%));
    opacity: 0;
    animation:
      stroke-draw 1.0s cubic-bezier(.55, .05, .25, 1) .95s forwards,
      stroke-appear .2s ease-out .95s forwards;
  }

  .fill {
    fill: var(--text);
    opacity: 0;
    transform-origin: 50% 50%;
    animation: fill-burst .6s cubic-bezier(.2, .8, .2, 1) 1.7s forwards;
  }

  @keyframes stroke-appear {
    to { opacity: 1; }
  }

  @keyframes fill-burst {
    0%   { opacity: 0; transform: scale(1.04); filter: blur(2px); }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  @keyframes warp-streak {
    0% {
      opacity: 0;
      width: 0;
      transform: rotate(var(--angle)) translateX(var(--start));
    }
    10% { opacity: .9; width: 24px; }
    60% { opacity: 1; width: 180px; }
    100% {
      opacity: 0;
      width: 240px;
      transform: rotate(var(--angle)) translateX(var(--end));
    }
  }

  .caption {
    height: 18px;
    color: var(--teal);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: .32em;
    text-transform: uppercase;
    opacity: 0;
    animation: caption-in .4s ease-out 2.1s forwards;
  }
  .caption .cursor {
    display: inline-block;
    width: 8px;
    margin-left: 3px;
    color: var(--teal);
    animation: blink 1s steps(1) infinite;
  }

  .pulse-ring {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 0 0 color-mix(in srgb, var(--teal), transparent 30%);
    opacity: 0;
    animation: pulse-ring 1.6s ease-out 2.3s forwards;
  }

  @keyframes hud-grid-in {
    to { opacity: 1; }
  }

  @keyframes scan-sweep {
    0% { opacity: 0; transform: translateX(-30%); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateX(30%); }
  }

  @keyframes bracket-in {
    from { opacity: 0; transform: scale(.6); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes stroke-draw {
    to { stroke-dashoffset: 0; }
  }

  @keyframes fill-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes caption-in {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @keyframes pulse-ring {
    0% { opacity: 1; box-shadow: 0 0 0 0 color-mix(in srgb, var(--teal), transparent 30%); }
    100% { opacity: 0; box-shadow: 0 0 0 220px color-mix(in srgb, var(--teal), transparent 100%); }
  }

  .replay-trigger .intro * {
    animation: none !important;
  }
</style>
</head>
<body class="is-loading">
  <button class="replay" id="replay">Replay</button>

  <div class="stage" id="stage">
    <div class="intro">
      <div class="warp" id="warp" aria-hidden="true"></div>

      <div class="brackets" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="wordmark">
        <svg viewBox="0 0 600 80" aria-label="Token Machine">
          <text class="stroke" x="50%" y="62" text-anchor="middle">TOKEN MACHINE</text>
          <text class="fill"   x="50%" y="62" text-anchor="middle">TOKEN MACHINE</text>
        </svg>
        <div class="caption" id="caption">
          <span id="capText">INITIALIZING</span><span class="cursor">▌</span>
        </div>
      </div>

      <div class="pulse-ring"></div>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const replay = document.getElementById("replay");
    let typingTimers = [];

    function seedWarp(root) {
      const warp = root.querySelector("#warp");
      if (!warp) return;
      warp.innerHTML = "";
      const COUNT = 90;
      const TOTAL_WINDOW = 1700;
      for (let n = 0; n < COUNT; n++) {
        const i = document.createElement("i");
        const angle = Math.random() * 360;
        const start = 18 + Math.random() * 110;
        const end   = 520 + Math.random() * 260;
        const dur   = 520 + Math.random() * 620;
        const delay = Math.random() * TOTAL_WINDOW;
        const thick = (0.9 + Math.random() * 1.4).toFixed(2);
        const tint  = Math.random() < 0.18 ? "#ffffff" : "var(--teal)";
        i.style.setProperty("--angle", angle + "deg");
        i.style.setProperty("--start", start + "px");
        i.style.setProperty("--end",   end + "px");
        i.style.setProperty("--dur",   dur + "ms");
        i.style.setProperty("--delay", delay + "ms");
        i.style.setProperty("--thick", thick + "px");
        i.style.setProperty("--tint",  tint);
        warp.appendChild(i);
      }
    }

    function typeStream(el, text, perChar = 55, startDelay = 0) {
      const t0 = setTimeout(() => {
        el.textContent = "";
        for (let k = 0; k < text.length; k++) {
          const tk = setTimeout(() => {
            el.textContent = text.slice(0, k + 1);
          }, k * perChar);
          typingTimers.push(tk);
        }
      }, startDelay);
      typingTimers.push(t0);
    }

    function run(root) {
      typingTimers.forEach(clearTimeout);
      typingTimers = [];
      const cap = root.querySelector("#capText");
      cap.textContent = "";
      seedWarp(root);
      typeStream(cap, "INITIALIZING", 55, 2100);
      // backspace, then type "ONLINE"
      typingTimers.push(setTimeout(() => {
        const word = "INITIALIZING";
        for (let k = 0; k < word.length; k++) {
          const tk = setTimeout(() => {
            cap.textContent = word.slice(0, word.length - 1 - k);
          }, k * 35);
          typingTimers.push(tk);
        }
        typingTimers.push(setTimeout(() => typeStream(cap, "ONLINE", 70, 0), word.length * 35 + 120));
      }, 3300));
    }

    replay.addEventListener("click", () => {
      const clone = stage.cloneNode(true);
      stage.replaceWith(clone);
      clone.id = "stage";
      run(clone);
    });

    run(stage);
  </script>
</body>
</html>
